<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProWallet Pro (Binance Level)</title><style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0e11;
  color:#eaecef;
  overflow-x:hidden;
}

/* TOP BAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#161a1e;
  border-bottom:1px solid #222;
}

.logo{
  color:#f0b90b;
  font-weight:bold;
  letter-spacing:1px;
}

/* LAYOUT */
.container{
  display:flex;
}

.sidebar{
  width:220px;
  background:#0b0e11;
  border-right:1px solid #222;
  padding:15px;
}

.sidebar h3{
  color:#f0b90b;
}

.sidebar p{
  padding:10px;
  cursor:pointer;
  color:#aaa;
  border-radius:6px;
}

.sidebar p:hover{
  background:#161a1e;
  color:#fff;
}

.main{
  flex:1;
  padding:15px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:15px;
}

.card{
  background:#161a1e;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 12px rgba(0,0,0,0.4);
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
}

.price{
  font-size:30px;
  font-weight:bold;
  color:#f0b90b;
}

.green{color:#0ecb81;}
.red{color:#f6465d;}

input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#0b0e11;
  color:#fff;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{opacity:0.85;}

.buy{background:#0ecb81;color:#000; width:48%;}
.sell{background:#f6465d;color:#fff; width:48%;}

canvas{
  width:100%;
  height:220px;
  background:#0b0e11;
  border-radius:10px;
}

/* LOGIN */
#loginPage{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.login-box{
  background:#161a1e;
  padding:25px;
  border-radius:10px;
  width:300px;
}

.login-box h2{
  text-align:center;
  color:#f0b90b;
}

</style></head>
<body><!-- LOGIN --><div id="loginPage">
  <div class="login-box">
    <h2>ProWallet Pro</h2>
    <input id="username" placeholder="Username" />
    <input id="password" type="password" placeholder="Password" />
    <button style="width:100%;margin-top:10px;background:#f0b90b;" onclick="login()">Login</button>
  </div>
</div><!-- APP --><div id="app" style="display:none;"><header>
  <div class="logo">⚡ PROWALLET PRO</div>
  <div>
    <span id="user"></span>
    <button onclick="logout()" style="margin-left:10px;background:#f6465d;color:#fff;">Logout</button>
  </div>
</header><div class="container"><!-- SIDEBAR --><div class="sidebar">
  <h3>Market</h3>
  <p>Dashboard</p>
  <p>Trade</p>
  <p>Portfolio</p>
</div><!-- MAIN --><div class="main"><div class="grid"><div class="card">
  <div>BTC/USDT</div>
  <div id="price" class="price">$0</div>
  <small id="status">Live Market</small>
</div><div class="card">
  <h3>Portfolio</h3>
  USD: $<span id="usd">0</span><br>
  BTC: <span id="btc">0</span><br>
  Total: $<span id="total">0</span>
</div><div class="card">
  <h3>Trade</h3>
  <input id="amount" placeholder="USD amount" />
  <div style="display:flex;justify-content:space-between;">
    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>
  </div>
</div><div class="card">
  <h3>Live Chart</h3>
  <canvas id="chart"></canvas>
</div><div class="card">
  <h3>History</h3>
  <div id="history"></div>
</div></div></div>
</div><script>
let price = 76000;
let chartData = [];
let interval;

window.addEventListener("load", ()=>{
  if(localStorage.getItem("user")) showApp();
});

function login(){
  let u=document.getElementById("username").value;
  if(!u) return alert("Enter username");

  localStorage.setItem("user",u);

  if(!localStorage.getItem("usd")){
    localStorage.setItem("usd","1000");
    localStorage.setItem("btc","0");
  }

  showApp();
}

function showApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";

  document.getElementById("user").innerText=localStorage.getItem("user");

  clearInterval(interval);
  interval=setInterval(update,1500);

  update();
}

function logout(){
  localStorage.removeItem("user");
  clearInterval(interval);
  location.reload();
}

function update(){
  price += (Math.random()-0.5)*250;
  price = Math.max(1000,price);

  chartData.push(price);
  if(chartData.length>40) chartData.shift();

  document.getElementById("price").innerText="$"+price.toFixed(2);

  portfolio();
  drawChart();
}

function portfolio(){
  let usd=+localStorage.getItem("usd")||0;
  let btc=+localStorage.getItem("btc")||0;

  let total=usd+btc*price;

  document.getElementById("usd").innerText=usd.toFixed(2);
  document.getElementById("btc").innerText=btc.toFixed(6);
  document.getElementById("total").innerText=total.toFixed(2);
}

function buy(){
  let amt=+document.getElementById("amount").value;
  let usd=+localStorage.getItem("usd")||0;
  let btc=+localStorage.getItem("btc")||0;

  if(amt>usd) return alert("Not enough USD");

  usd-=amt;
  btc+=amt/price;

  localStorage.setItem("usd",usd);
  localStorage.setItem("btc",btc);
}

function sell(){
  let amt=+document.getElementById("amount").value;
  let usd=+localStorage.getItem("usd")||0;
  let btc=+localStorage.getItem("btc")||0;

  let b=amt/price;
  if(b>btc) return alert("Not enough BTC");

  btc-=b;
  usd+=amt;

  localStorage.setItem("usd",usd);
  localStorage.setItem("btc",btc);
}

function drawChart(){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  c.width=c.clientWidth;
  c.height=220;

  ctx.clearRect(0,0,c.width,c.height);
  ctx.beginPath();

  let max=Math.max(...chartData);
  let min=Math.min(...chartData);

  chartData.forEach((p,i)=>{
    let x=(i/chartData.length)*c.width;
    let y=c.height-((p-min)/(max-min))*c.height;

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle="#f0b90b";
  ctx.stroke();
}
</script></body>
</html>
