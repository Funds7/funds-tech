<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broker Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">

    <h1>Login</h1>

    <input placeholder="Username">
    <input type="password" placeholder="Password">

    <button onclick="login()">Login</button>

  </div>

  <!-- DASHBOARD -->
  <div id="app" style="display:none; padding:20px;">

    <div class="balance-card" style="margin-bottom:20px;">
      <h4>Total Balance</h4>
      <h1>$1,000.00</h1>
      <p class="profit">Market Price: <span id="price">$100.00</span></p>
    </div>

    <div class="trade-buttons">
  <button style="background:#00c853;" onclick="buy()">BUY</button>
  <button style="background:#ff3d00;" onclick="sell()">SELL</button>
    </div>

    <h3>Trades</h3>
    <ul id="trades"></ul>

  </div>

</div>

<script src="./script.js"></script>

</body>
</html>
