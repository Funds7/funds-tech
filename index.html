<!DOCTYPE html>
<html>
<head>
  <title>Simple Broker Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 10px auto;
      width: 300px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .buy { background: green; color: white; }
    .sell { background: red; color: white; }
  </style>
</head>

<body>

  <h1>📊 My Broker Dashboard</h1>

  <div class="card">
    <h2>Account Balance</h2>
    <h1 id="balance">$1000</h1>
  </div>

  <div class="card">
    <h2>Trade BTC/USD</h2>
    <button class="buy" onclick="buy()">BUY</button>
    <button class="sell" onclick="sell()">SELL</button>
  </div>

  <script>
    let balance = 1000;

    function update() {
      document.getElementById("balance").innerText = "$" + balance;
      localStorage.setItem("balance", balance);
    }

    function buy() {
      balance += 100;
      update();
    }

    function sell() {
      balance -= 100;
      update();
    }

    // load saved balance
    if (localStorage.getItem("balance")) {
      balance = Number(localStorage.getItem("balance"));
      update();
    }
  </script>

</body>
</html>
