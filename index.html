<body>

<div class="container">

  <h2>💰 Demo Wallet</h2>

  <div id="login" class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="app" class="card hidden">
    <h3>Welcome, <span id="name"></span></h3>

    <h2>Balance</h2>
    <div class="balance">$<span id="balance">1000</span></div>

    <input id="sendUser" placeholder="Send to user">
    <input id="amount" placeholder="Amount">

    <button onclick="send()">Send</button>

    <h4>Transactions</h4>
    <div id="history"></div>

    <button style="background:red" onclick="logout()">Logout</button>
  </div>

</div>

<script>
let balance = 1000;

function login() {
  let user = document.getElementById("user").value;
  if(!user) return alert("Enter username");

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("name").innerText = user;
}

function send() {
  let user = document.getElementById("sendUser").value;
  let amount = parseInt(document.getElementById("amount").value);

  if(!user || !amount) return alert("Fill all fields");
  if(amount > balance) return alert("Not enough balance");

  balance -= amount;
  document.getElementById("balance").innerText = balance;

  let div = document.createElement("div");
  div.innerHTML = `Sent $${amount} to ${user}`;
  document.getElementById("history").appendChild(div);
}

function logout() {
  location.reload();
}
</script>

</body>
