<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funds App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px 0;
      border-radius: 12px;
    }

    .balance {
      font-size: 28px;
      color: #22c55e;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
    }

    button:hover {
      background: #2563eb;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
      margin-right: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<header>
  💰 Funds App (Pi Test)
</header>

<div class="container">

  <div class="card">
    <h3>Wallet Balance</h3>
    <div class="balance">π 0.00</div>
    <p>Testnet account overview</p>
  </div>

  <div class="card">
    <h3>Actions</h3>
    <button onclick="login()">Login with Pi</button>
    <button onclick="pay()">Send Test Payment</button>
  </div>

  <div class="card">
    <h3>Quick Links</h3>
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms</a>
  </div>

</div>

<footer>
  Funds App • Built for Pi Browser Testnet
</footer>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
  Pi.init({ version: "2.0" });

  async function login() {
    try {
      const scopes = ['payments'];
      const user = await Pi.authenticate(scopes);
      alert("Login successful!");
      console.log(user);
    } catch (e) {
      alert("Login failed");
      console.log(e);
    }
  }

  async function pay() {
    try {
      const payment = await Pi.createPayment({
        amount: 0.01,
        memo: "Funds Test Payment",
        metadata: { type: "test" }
      });

      alert("Payment initiated!");
      console.log(payment);
    } catch (e) {
      alert("Payment failed");
      console.log(e);
    }
  }
</script>

</body>
</html>
