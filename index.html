<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Wallet Demo</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0b1220, #05070f);
  color: white;
}

/* Layout */
.container {
  max-width: 420px;
  margin: auto;
  padding: 16px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.badge {
  background: #1f2937;
  padding: 6px 10px;
  border-radius: 20px;
  font-size: 12px;
  color: #38bdf8;
}

/* Cards */
.card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 16px;
  margin-top: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

/* Balance */
.balance {
  font-size: 34px;
  font-weight: bold;
  color: #22c55e;
}

/* Buttons */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

.sendBtn {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  color: white;
}

.secondary {
  background: #1f2937;
  color: white;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.1);
  background: #0b1220;
  color: white;
}

/* Transactions */
.tx {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  margin-top: 8px;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  font-size: 13px;
}

.sent { color: #ef4444; }
.recv { color: #22c55e; }

/* Login */
.hidden { display: none; }

.title {
  font-size: 22px;
  font-weight: bold;
}

.small {
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">Pro Wallet</div>
    <div class="badge">DEMO</div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input type="password" placeholder="Password">
    <button class="sendBtn" onclick="login()">Login</button>
  </div>

  <!-- DASHBOARD -->
  <div id="app" class="hidden">

    <div class="card">
      <div class="small">Total Balance</div>
      <div class="balance">$<span id="balance">2500</span>.00</div>
      <div class="small">USD Demo Tokens</div>
    </div>

    <div class="card">
      <h3>Send Funds</h3>
      <input id="to" placeholder="Recipient address (0x...)">
      <input id="amount" placeholder="Amount (USD)">
      <button class="sendBtn" onclick="send()">Send</button>
      <button class="secondary" onclick="receive()">Receive</button>
    </div>

    <div class="card">
      <h3>Recent Transactions</h3>
      <div id="tx"></div>
    </div>

    <div class="card">
      <button class="secondary" onclick="logout()">Logout</button>
    </div>

  </div>

</div>

<script>
let balance = 2500;

function login(){
  let user = document.getElementById("user").value;
  if(!user) return alert("Enter username");

  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

function send(){
  let to = document.getElementById("to").value;
  let amt = parseFloat(document.getElementById("amount").value);

  if(!to || !amt) return alert("Fill fields");
  if(amt > balance) return alert("Not enough balance");

  balance -= amt;
  document.getElementById("balance").innerText = balance;

  addTx("Sent", to, -amt, "sent");
}

function receive(){
  let amt = Math.floor(Math.random()*500)+50;
  balance += amt;
  document.getElementById("balance").innerText = balance;

  addTx("Received", "0xAUTO..." + Math.floor(Math.random()*9999), amt, "recv");
}

function addTx(type, addr, amt, cls){
  let div = document.createElement("div");
  div.className = "tx";
  div.innerHTML = `
    <div>
      <b class="${cls}">${type}</b><br>
      ${addr}
    </div>
    <div>${amt > 0 ? "+" : ""}${amt}.00</div>
  `;
  document.getElementById("tx").prepend(div);
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
