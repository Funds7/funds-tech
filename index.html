<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProWallet</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.hidden{display:none;}

.container{
  padding:20px;
}

.card{
  background:#121a2a;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

button{
  padding:10px;
  margin:5px;
  cursor:pointer;
  border:none;
  border-radius:5px;
}

input{
  padding:10px;
  margin:5px;
  width:90%;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div id="loginPage" class="container">
  <h2>ProWallet Login</h2>

  <input id="username" placeholder="Username" />
  <input id="password" type="password" placeholder="Password" />

  <button onclick="login()">Login</button>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="app" class="container hidden">

  <h2>ProWallet</h2>
  <button onclick="logout()">Logout</button>

  <div class="card">
    <h3>Live Prices</h3>
    BTC: $<span id="btcPrice"></span><br/>
    ETH: $<span id="ethPrice"></span>
  </div>

  <div class="card">
    <h3>Wallet</h3>
    Balance: $<span id="usdBalance"></span><br/>
    BTC: <span id="btcHoldings"></span><br/>
    Total: $<span id="totalValue"></span><br/>
    P/L: <span id="pl"></span>
  </div>

  <div class="card">
    <h3>Trade</h3>
    <input id="tradeAmount" placeholder="Amount in USD"/>

    <button onclick="buy()">BUY</button>
    <button onclick="sell()">SELL</button>
  </div>

  <div class="card">
    <h3>Trade History</h3>
    <div id="tradeHistory"></div>
  </div>

</div>

<script>
// ================= STATE =================
let state = JSON.parse(localStorage.getItem("wallet")) || {
  loggedIn:false,
  usdBalance:1000,
  btcHoldings:0,
  btcPrice:76000,
  ethPrice:2300,
  trades:[]
};

const START = 1000;

// ================= SAVE =================
function save(){
  localStorage.setItem("wallet", JSON.stringify(state));
}

// ================= LOGIN =================
function login(){
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(!u || !p) return alert("Enter details");

  state.loggedIn = true;
  save();
  showApp();
}

// ================= LOGOUT =================
function logout(){
  state.loggedIn = false;
  save();
  showLogin();
}

// ================= NAV =================
function showApp(){
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  render();
}

function showLogin(){
  document.getElementById("app").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

// ================= PRICES =================
function updatePrices(){
  state.btcPrice += (Math.random()-0.5)*200;
  state.ethPrice += (Math.random()-0.5)*10;
}

// ================= BUY =================
function buy(){
  let amt = parseFloat(document.getElementById("tradeAmount").value);
  if(!amt || amt <= 0) return;

  if(amt > state.usdBalance) return alert("Not enough USD");

  let btc = amt / state.btcPrice;

  state.usdBalance -= amt;
  state.btcHoldings += btc;

  state.trades.unshift({
    type:"BUY",
    amt,
    time:new Date().toLocaleTimeString()
  });

  save();
  render();
}

// ================= SELL =================
function sell(){
  let amt = parseFloat(document.getElementById("tradeAmount").value);
  if(!amt || amt <= 0) return;

  let btc = amt / state.btcPrice;

  if(btc > state.btcHoldings) return alert("Not enough BTC");

  state.usdBalance += amt;
  state.btcHoldings -= btc;

  state.trades.unshift({
    type:"SELL",
    amt,
    time:new Date().toLocaleTimeString()
  });

  save();
  render();
}

// ================= PORTFOLIO =================
function totalValue(){
  return state.usdBalance + (state.btcHoldings * state.btcPrice);
}

function pl(){
  let diff = totalValue() - START;
  let pct = (diff/START)*100;
  return `${diff.toFixed(2)} (${pct.toFixed(2)}%)`;
}

// ================= RENDER =================
function render(){

  document.getElementById("btcPrice").innerText = state.btcPrice.toFixed(2);
  document.getElementById("ethPrice").innerText = state.ethPrice.toFixed(2);

  document.getElementById("usdBalance").innerText = state.usdBalance.toFixed(2);
  document.getElementById("btcHoldings").innerText = state.btcHoldings.toFixed(6);

  document.getElementById("totalValue").innerText = totalValue().toFixed(2);
  document.getElementById("pl").innerText = pl();

  let h = document.getElementById("tradeHistory");
  h.innerHTML = "";

  state.trades.slice(0,10).forEach(t=>{
    let div = document.createElement("div");
    div.innerText = `${t.type} $${t.amt} • ${t.time}`;
    h.appendChild(div);
  });

  save();
}

// ================= LOOP =================
setInterval(()=>{
  updatePrices();
  if(state.loggedIn) render();
},3000);

// ================= INIT =================
if(state.loggedIn){
  showApp();
}else{
  showLogin();
}
</script>

</body>
</html>
