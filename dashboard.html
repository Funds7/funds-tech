<!DOCTYPE html>
<html>
<head>
  <title>Pro Wallet</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>⚡ ProWallet</h2>
    <p id="user">User</p>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP CARD -->
    <div class="card top">
      <h3>Balance</h3>
      <h1>$<span id="balance">0</span></h1>
    </div>

    <!-- TRADE SECTION -->
    <div class="card">
      <h3>Trade</h3>
      <input id="amount" placeholder="Enter amount">

      <div class="btns">
        <button class="buy" onclick="buy()">BUY</button>
        <button class="sell" onclick="sell()">SELL</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="card">
      <h3>History</h3>
      <ul id="history"></ul>
    </div>

  </div>

</div>

<script src="app.js"></script>

</body>
</html>
