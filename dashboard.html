<!DOCTYPE html>
<html>
<head>
  <title>Pro Wallet</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>⚡ ProWallet</h2>

    <p class="user">User: <span id="user">-</span></p>

    <button onclick="logout()">Logout</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- LIVE PRICES -->
    <div class="card">
      <h3>Live Crypto Prices</h3>

      <p>BTC: $<span id="btc">loading...</span></p>
      <p>ETH: $<span id="eth">loading...</span></p>
    </div>
<div class="card">
  <h3>Market Chart (BTC/USD)</h3>

  <iframe
    src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&interval=15&theme=dark"
    width="100%"
    height="400"
    style="border:none;border-radius:10px;">
  </iframe>

</div>
    <!-- TOP CARDS -->
    <div class="grid">

      <div class="card">
        <h3>Balance</h3>
        <h1>$<span id="balance">0</span></h1>
      </div>
<div class="card">
  <h3>Portfolio</h3>

  <p>USD: $<span id="usd">0</span></p>
  <p>BTC: <span id="btc_hold">0</span></p>
  <p>ETH: <span id="eth_hold">0</span></p>

  <h3>Total Value: $<span id="total">0</span></h3>
</div>
      <div class="card">
        <h3>Market Status</h3>
        <p>Live Demo Trading</p>
      </div>

    </div>

    <!-- TRADE BOX -->
    <div class="card trade">
      <h3>Trade</h3>

      <input id="amount" placeholder="Enter amount">

      <div class="buttons">
        <button class="buy" onclick="buy()">BUY</button>
        <button class="sell" onclick="sell()">SELL</button>
      </div>
    </div>

    <!-- HISTORY -->
    <div class="card">
      <h3>History</h3>
      <ul id="history"></ul>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
