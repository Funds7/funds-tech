<!DOCTYPE html>
<html>
<head>
  <title>ProWallet Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">

  <h2>Welcome, <span id="username"></span></h2>

  <div class="card">
  <div class="row">
    <span>💰 Balance</span>
    <span>$<span id="balance">0.00</span></span>
  </div>

  <div class="row">
    <span>🪙 BTC Owned</span>
    <span><span id="btc">0.000000</span></span>
  </div>

  <div class="row">
    <span>📈 BTC Price</span>
    <span>$<span id="price">Loading...</span></span>
  </div>

  <div class="row">
    <span>💼 Total Value</span>
    <span>$<span id="totalValue">0.00</span></span>
  </div>

  <div class="row">
    <span>📊 P/L</span>
    <span>
      $<span id="profit">0.00</span>
      (<span id="profitPercent">0%</span>)
    </span>
  </div>
  </div>
  <div class="card">
  <h3>📊 Live BTC Chart</h3>
  <div id="chart" style="height:400px;"></div>
  </div>

  <div class="card">
  <button class="buy" onclick="buyBTC()">BUY</button>
  <button class="sell" onclick="sellBTC()">SELL</button>
</div>

<div class="card">
  <h3>💳 Wallet Actions</h3>
  <button onclick="deposit()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
  <button onclick="transfer()">Transfer</button>
</div>


  <div class="card">
  <h3>📜 History</h3>

  <div class="history-controls">
    <button onclick="resetHistory()">🧹 Clear History</button>
  </div>

  <div id="history"></div>
  </div>

<!-- ✅ SCRIPTS GO HERE -->

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
new TradingView.widget({
  "width": "100%",
  "height": 400,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "5",
  "timezone": "Etc/UTC",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "toolbar_bg": "#0b0f1a",
  "enable_publishing": false,
  "hide_top_toolbar": false,
  "save_image": false,
  "container_id": "chart"
});
</script>

<script src="script.js"></script>

</body>
</html>
